{{ define "content" }}
<section class="card">
    <h2>Start training</h2>
    <p class="muted">Choose a mode and begin a short review session.</p>

    <div class="mode_grid">
        {{ range .Modes }}
        <a class="mode_button" href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
    </div>
</section>

<section class="card">
    <h2>Topics</h2>
    <p class="muted">Topic-based vocabulary and notes will appear here.</p>

    <ul class="topic_list">
        {{ range .Topics }}
        <li>
            <a class="topic_item" href="{{ .URL }}">{{ .Name }}</a>
        </li>
        {{ end }}
    </ul>
</section>
{{ end }}
